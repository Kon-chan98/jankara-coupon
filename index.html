<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ジャンカラ クーポン割引計算機</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    h1 { font-size: 17px; font-weight: 600; margin-bottom: 1.75rem; color: #1a1a1a; }

    .field { margin-bottom: 1.25rem; }
    .field-label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
    .required { color: #e04040; margin-left: 2px; }
    .optional { font-size: 11px; color: #999; margin-left: 4px; }
    .input-row { display: flex; align-items: center; gap: 6px; }
    .yen { font-size: 17px; color: #999; flex-shrink: 0; }
    .unit { font-size: 13px; color: #999; }
    .error-msg { font-size: 12px; color: #e04040; margin-top: 5px; min-height: 16px; display: block; }

    input[type="number"] {
      font-size: 17px; font-family: inherit;
      padding: 8px 10px;
      border: 1px solid #ddd; border-radius: 8px;
      outline: none; color: #1a1a1a; background: #fafafa;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: #555; background: #fff; }
    input[type="number"].input-error { border-color: #e04040; background: #fff8f8; }

    /* 料金入力：矢印非表示 */
    .no-spinner::-webkit-outer-spin-button,
    .no-spinner::-webkit-inner-spin-button { -webkit-appearance: none; }
    .no-spinner { -moz-appearance: textfield; }

    .divider { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }

    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; gap: 12px;
    }
    .total-label { font-size: 13px; color: #888; white-space: nowrap; }
    .total-label span { font-weight: 500; color: #1a1a1a; }

    .copy-btn {
      display: flex; align-items: center; gap: 6px; justify-content: center;
      padding: 7px 14px; font-size: 13px; font-weight: 500; font-family: inherit;
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      color: #1a1a1a; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .copy-btn:hover { background: #f5f4f0; }
    .copy-btn.copied { color: #1e7e34; border-color: #a8d5b5; }

    .result-card {
      border: 1px solid #eee; border-radius: 12px;
      padding: 0.75rem 1rem; margin-bottom: 10px;
    }
    .result-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .result-name { font-size: 13px; color: #666; }
    .result-price { font-size: 18px; font-weight: 600; color: #1a1a1a; }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 5px; margin-left: 6px; vertical-align: middle;
    }
    .badge-blue  { background: #e8f0fe; color: #2a5fd4; }
    .badge-green { background: #e6f4ea; color: #1e7e34; }

    .people-row {
      display: flex; align-items: center; gap: 8px;
      border-top: 1px solid #f0f0f0; padding-top: 8px;
    }
    .people-row label { font-size: 13px; color: #888; flex-shrink: 0; }
    .people-row input { width: 72px; font-size: 15px; }
    .col-label { font-size: 13px; color: #888; margin-left: auto; flex-shrink: 0; }
    .col-value { font-size: 15px; font-weight: 600; color: #1e7e34; white-space: nowrap; }

    .summary-box {
      background: #f5f4f0; border-radius: 12px;
      padding: 1rem 1.25rem; margin-top: 4px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .summary-box .label { font-size: 14px; color: #666; }
    .summary-box .value { font-size: 20px; font-weight: 700; color: #1e7e34; }

    #placeholder { text-align: center; font-size: 13px; color: #bbb; padding: 1.5rem 0 0.5rem; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      .card { background: #252525; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
      h1 { color: #f0f0f0; }
      .field-label { color: #aaa; }
      input[type="number"] { background: #2e2e2e; border-color: #444; color: #f0f0f0; }
      input[type="number"]:focus { border-color: #aaa; background: #333; }
      input[type="number"].input-error { border-color: #e04040; background: #2e1e1e; }
      .divider { border-top-color: #333; }
      .total-label { color: #777; }
      .total-label span { color: #f0f0f0; }
      .copy-btn { background: #2e2e2e; border-color: #444; color: #f0f0f0; }
      .copy-btn:hover { background: #333; }
      .copy-btn.copied { color: #5fc47a; border-color: #2e5c3a; }
      .result-card { border-color: #333; }
      .result-name { color: #aaa; }
      .result-price { color: #f0f0f0; }
      .people-row { border-top-color: #333; }
      .people-row label, .col-label { color: #777; }
      .col-value { color: #5fc47a; }
      .summary-box { background: #2e2e2e; }
      .summary-box .label { color: #aaa; }
      .summary-box .value { color: #5fc47a; }
      .badge-blue  { background: #1e2d54; color: #7aa6f5; }
      .badge-green { background: #1a2e1e; color: #5fc47a; }
      .yen, .unit { color: #666; }
      #placeholder { color: #555; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ジャンカラ クーポン割引計算機</h1>

    <div class="field">
      <label class="field-label" for="price-main">通常料金<span class="required">*</span></label>
      <div class="input-row">
        <span class="yen">¥</span>
        <input type="number" id="price-main" placeholder="例: 1260" min="1" class="no-spinner" style="width:160px;" oninput="onInput()" onblur="validateMain()" />
        <span class="unit">円</span>
      </div>
      <span class="error-msg" id="err-main"></span>
    </div>

    <div class="field">
      <label class="field-label" for="price-concept">コンセプトルーム料金<span class="optional">（任意）</span></label>
      <div class="input-row">
        <span class="yen">¥</span>
        <input type="number" id="price-concept" placeholder="例: 300" min="0" class="no-spinner" style="width:160px;" oninput="onInput()" />
        <span class="unit">円</span>
      </div>
      <span class="error-msg" id="err-concept"></span>
    </div>

    <hr class="divider" />

    <div id="results" style="display:none;">

      <div class="total-row">
        <p class="total-label">料金合計：<span id="val-total"></span></p>
        <button class="copy-btn" id="copy-btn" onclick="copyText()">
          <i class="ti ti-copy" aria-hidden="true"></i>料金コピー
        </button>
      </div>

      <div class="result-card">
        <div class="result-top">
          <span class="result-name">法人クーポン<span class="badge badge-blue">30% オフ</span></span>
          <span class="result-price" id="val-30"></span>
        </div>
        <div class="people-row">
          <label for="ppl-30">人数</label>
          <input type="number" id="ppl-30" placeholder="0" min="0" oninput="calcTotal()" />
          <span class="unit">人</span>
          <span class="col-label">集金</span>
          <span class="col-value" id="col-30">—</span>
        </div>
      </div>

      <div class="result-card">
        <div class="result-top">
          <span class="result-name">法人＋個人30%オフ<span class="badge badge-green">60% オフ</span></span>
          <span class="result-price" id="val-60"></span>
        </div>
        <div class="people-row">
          <label for="ppl-60">人数</label>
          <input type="number" id="ppl-60" placeholder="0" min="0" oninput="calcTotal()" />
          <span class="unit">人</span>
          <span class="col-label">集金</span>
          <span class="col-value" id="col-60">—</span>
        </div>
      </div>

      <div class="result-card">
        <div class="result-top">
          <span class="result-name">法人＋個人50%オフ<span class="badge badge-green">80% オフ</span></span>
          <span class="result-price" id="val-80"></span>
        </div>
        <div class="people-row">
          <label for="ppl-80">人数</label>
          <input type="number" id="ppl-80" placeholder="0" min="0" oninput="calcTotal()" />
          <span class="unit">人</span>
          <span class="col-label">集金</span>
          <span class="col-value" id="col-80">—</span>
        </div>
      </div>

      <div id="summary-section" style="display:none;">
        <div class="summary-box">
          <span class="label">集金合計</span>
          <span class="value" id="col-total"></span>
        </div>
      </div>
    </div>

    <p id="placeholder">金額を入力すると割引後の料金が表示されます</p>
  </div>

  <script>
    function ceilTen(n) { return Math.ceil(n / 10) * 10; }
    function fmt(n) { return n.toLocaleString('ja-JP') + '円'; }

    let p30 = 0, p60 = 0, p80 = 0, totalBase = 0;

    function validateMain() {
      const input = document.getElementById('price-main');
      const err = document.getElementById('err-main');
      const val = input.value.trim();
      if (!val) { err.textContent = '通常料金を入力してください'; input.classList.add('input-error'); return false; }
      if (parseFloat(val) <= 0) { err.textContent = '0より大きい金額を入力してください'; input.classList.add('input-error'); return false; }
      err.textContent = ''; input.classList.remove('input-error'); return true;
    }

    function validateConcept() {
      const input = document.getElementById('price-concept');
      const err = document.getElementById('err-concept');
      const val = input.value.trim();
      if (val !== '' && parseFloat(val) < 0) { err.textContent = '0以上の金額を入力してください'; input.classList.add('input-error'); return false; }
      err.textContent = ''; input.classList.remove('input-error'); return true;
    }

    function onInput() {
      validateConcept();
      if (document.getElementById('price-main').value.trim() !== '') validateMain();
      const mainRaw = parseFloat(document.getElementById('price-main').value);
      const conceptRaw = parseFloat(document.getElementById('price-concept').value) || 0;
      if (!mainRaw || mainRaw <= 0 || conceptRaw < 0) {
        document.getElementById('results').style.display = 'none';
        document.getElementById('placeholder').style.display = 'block';
        return;
      }
      totalBase = mainRaw + conceptRaw;
      p30 = ceilTen(totalBase * 0.70);
      p60 = ceilTen(totalBase * 0.40);
      p80 = ceilTen(totalBase * 0.20);
      document.getElementById('results').style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('val-total').textContent = fmt(totalBase);
      document.getElementById('val-30').textContent = fmt(p30);
      document.getElementById('val-60').textContent = fmt(p60);
      document.getElementById('val-80').textContent = fmt(p80);
      calcTotal();
    }

    function calcTotal() {
      const n30 = parseInt(document.getElementById('ppl-30').value) || 0;
      const n60 = parseInt(document.getElementById('ppl-60').value) || 0;
      const n80 = parseInt(document.getElementById('ppl-80').value) || 0;
      document.getElementById('col-30').textContent = n30 > 0 ? fmt(p30 * n30) : '—';
      document.getElementById('col-60').textContent = n60 > 0 ? fmt(p60 * n60) : '—';
      document.getElementById('col-80').textContent = n80 > 0 ? fmt(p80 * n80) : '—';
      const summary = document.getElementById('summary-section');
      if (n30 > 0 || n60 > 0 || n80 > 0) {
        document.getElementById('col-total').textContent = fmt((p30 * n30) + (p60 * n60) + (p80 * n80));
        summary.style.display = 'block';
      } else {
        summary.style.display = 'none';
      }
    }

    function copyText() {
      const text =
        '■料金\n' +
        '通常料金　' + fmt(totalBase) + '\n' +
        '法人クーポン　' + fmt(p30) + '\n' +
        '　＋個人30％オフ　' + fmt(p60) + '\n' +
        '　＋個人50％オフ　' + fmt(p80);
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i>コピーしました';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i>料金コピー';
        }, 2000);
      });
    }
  </script>
</body>
</html>
